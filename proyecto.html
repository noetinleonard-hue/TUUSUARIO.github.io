<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Proyecto | FG Estudio</title>

<style>
body {
    margin:0;
    background:#0a0a0a;
    color:#fff;
    font-family: Arial;
}

.hero {
    height: 80vh;
    background: url('FACHADA-P.jpg') center/cover;
}

.container {
    padding: 60px;
}

.slider-container {
    position: relative;
    width: 90%;
    margin: 80px auto;
    overflow: hidden;
}

.slider {
    position: relative;
    width: 100%;
    height: 70vh;
}

.slide {
    position: absolute;
    width: 100%;
    height: 70vh;
    object-fit: cover;
    opacity: 0;
    transition: opacity 0.6s ease;
    border-radius: 12px;
}

.slide.active {
    opacity: 1;
}

.prev,
.next {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.5);
    color: white;
    border: none;
    font-size: 30px;
    padding: 12px 18px;
    cursor: pointer;
    z-index: 10;
    border-radius: 50%;
    transition: 0.3s;
}

.prev:hover,
.next:hover {
    background: rgba(255,255,255,0.2);
}

.prev {
    left: 20px;
}

.next {
    right: 20px;
}    
    
.gallery {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 10px;
}

.gallery img {
    width: 100%;
}

</style>
</head>

<body>

<div class="hero"></div>

<div class="container">
<h1>Villa Rivera</h1>

<p>Proyecto residencial contemporáneo de alto nivel.</p>

<div class="slider-container">

    <button class="prev">&#10094;</button>

    <div class="slider">

        <img src="VRender1.jpg" class="slide active">
        <img src="VRender2.jpg" class="slide">
        <img src="VRender3.jpg" class="slide">
        <img src="VRender4.jpg" class="slide">
        <img src="VRender5.jpg" class="slide">
        <img src="VRender6.jpg" class="slide">
        <img src="VRender7.jpg" class="slide">
         
    </div>

    <button class="next">&#10095;</button>

</div>

</div>

<script>

const slides = document.querySelectorAll('.slide');
const next = document.querySelector('.next');
const prev = document.querySelector('.prev');

let current = 0;

function showSlide(index) {

    slides.forEach(slide => {
        slide.classList.remove('active');
    });

    slides[index].classList.add('active');
}

next.addEventListener('click', () => {

    current++;

    if(current >= slides.length) {
        current = 0;
    }

    showSlide(current);

});

prev.addEventListener('click', () => {

    current--;

    if(current < 0) {
        current = slides.length - 1;
    }

    showSlide(current);

});

</script>

</body>
</html>
    
</body>
</html>
