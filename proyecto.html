<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Proyecto | FG Estudio</title>

<style>
body {
    margin:0;
    background:#0a0a0a;
    color:#fff;
    font-family: Arial;
}

.hero {
    height: 80vh;
    background: url('FACHADA-P.jpg') center/cover;
}

.container {
    padding: 60px;
}

.slider-container {
    position: relative;
    width: 92%;
    margin: 100px auto;
}

.slider {
    position: relative;
    width: 100%;
    height: 82vh;
    background: #0d0d0d;
    overflow: hidden;
    border-radius: 10px;
}

.slide {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: contain;
    opacity: 0;
    transition: opacity 1.2s ease;
}

.slide.active {
    opacity: 1;
}

.prev,
.next {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 52px;
    height: 52px;
    border: none;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(8px);
    color: white;
    font-size: 18px;
    cursor: pointer;
    z-index: 20;
    transition: 0.3s ease;
}

.prev:hover,
.next:hover {
    background: rgba(255,255,255,0.14);
}

.prev {
    left: 25px;
}

.next {
    right: 25px;
}
    
.gallery {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 10px;
}

.gallery img {
    width: 100%;
}

</style>
</head>

<body>

<div class="hero"></div>

<div class="container">
<h1>Villa Rivera</h1>

<p>Proyecto residencial contemporáneo de alto nivel.</p>

<div class="slider-container">

    <button class="prev">&#10094;</button>

    <div class="slider">

        <img src="proyecto1.jpg" class="slide active">
        <img src="proyecto2.jpg" class="slide">
        <img src="proyecto3.jpg" class="slide">

    </div>

    <button class="next">&#10095;</button>

</div>
    
</div>

<script>

const slides = document.querySelectorAll('.slide');
const next = document.querySelector('.next');
const prev = document.querySelector('.prev');

let current = 0;

function showSlide(index) {

    slides.forEach(slide => {
        slide.classList.remove('active');
    });

    slides[index].classList.add('active');
}

next.addEventListener('click', () => {

    current++;

    if(current >= slides.length) {
        current = 0;
    }

    showSlide(current);

});

prev.addEventListener('click', () => {

    current--;

    if(current < 0) {
        current = slides.length - 1;
    }

    showSlide(current);

});

setInterval(() => {

    current++;

    if(current >= slides.length) {
        current = 0;
    }

    showSlide(current);

}, 6000);

</script>

</body>
</html>
    
</body>
</html>
