<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FG Estudio</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #0a0a0a;
    color: #fff;
}

/* HEADER */
header {
    position: fixed;
    width: 100%;
    padding: 20px 60px;
    display: flex;
    justify-content: space-between;
    background: rgba(0,0,0,0.6);
    z-index: 10;
}

/* LOGO */
.logo span {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
}

.logo small {
    display: block;
    font-size: 10px;
    letter-spacing: 4px;
    color: #c5a47e;
}

nav a {
    margin-left: 25px;
    color: #ccc;
    text-decoration: none;
}

/* HERO */
.hero {
    height: 100vh;
    background: url('hero.jpg') center/cover no-repeat;
    display: flex;
    align-items: center;
    padding: 60px;
}

.hero h1 {
    font-size: 55px;
    font-family: 'Playfair Display', serif;
}

/* BOTONES */
.btn {
    border: 1px solid #fff;
    padding: 12px 25px;
    display: inline-block;
    margin-top: 15px;
    text-decoration: none;
    color: #fff;
}

/* SECCIONES */
.section {
    padding: 100px 60px;
}

/* PROYECTOS */
.projects {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px,1fr));
    gap: 30px;
}

.project {
    display: none;
    text-decoration: none;
    color: #fff;
}

.project.active {
    display: block;
}

.project img {
    width: 100%;
    height: 300px;
    object-fit: cover;
}

/* TEXTO */
.text-block {
    max-width: 800px;
    line-height: 1.6;
}

/* CONTACTO */
.contact a {
    display: block;
    color: #ccc;
    margin: 10px 0;
    text-decoration: none;
}

/* WHATSAPP */
.whatsapp {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: #25D366;
    padding: 15px;
    border-radius: 50%;
    text-decoration: none;
}

/* ANIMACIONES */
.fade {
    opacity: 0;
    transform: translateY(40px);
    transition: 1s;
}

.fade.visible {
    opacity: 1;
    transform: translateY(0);
}

</style>
</head>

<body>

<header>
<div class="logo">
<span>FG</span>
<small>ESTUDIO</small>
</div>

<nav>
<a href="#">Inicio</a>
<a href="#proyectos">Proyectos</a>
<a href="#contacto">Contacto</a>
</nav>
</header>

<section class="hero">
<div>
<h1>FG Estudio</h1>
<p>Arquitectura · Paisajismo · Interiorismo</p>

<a href="#proyectos" class="btn">Ver proyectos</a>
</div>
</section>

<section class="section fade" id="proyectos">
<h2>Proyectos</h2>

<div class="projects">

<a href="proyecto.html" class="project active fade">
<img src="proyecto1.jpg">
<h3>Villa Rivera</h3>
</a>

<a href="proyecto-villa-g2.html" class="project active fade">
<img src="proyecto2.jpg">
<h3>Villa G2</h3>
</a>
    
<a href="proyecto-residencia-h14.html" class="project active fade">
<img src="proyecto3.jpg">
<h3>Residencia H14</h3>
</a>    

<a href="proyecto-villa-mk.html" class="project active fade">
<img src="proyecto4.jpg">
<h3>Cabaña MK</h3>
</a>
    
</div>
</section>

<section class="section fade" id="contacto">
<h2>Contacto</h2>

<a href="tel:3314890745">📞 3314890745</a>
<a href="mailto:contacto@fgestudio.com">✉ contacto@fgestudio.com</a>

</section>

<a href="https://wa.me/523314890745" class="whatsapp">💬</a>

<script>
const faders = document.querySelectorAll('.fade');

window.addEventListener('scroll', () => {
    const trigger = window.innerHeight * 0.85;

    faders.forEach(el => {
        const top = el.getBoundingClientRect().top;
        if(top < trigger){
            el.classList.add('visible');
        }
    });
});
</script>

</body>
</html>
